<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Slider</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #111;
      font-family: sans-serif;
    }

    .slider {
      position: relative;
      width: 400px;
      height: 500px;
      overflow: hidden;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
    }

    .slides img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    .slides img.displayslide {
      display: block;
      animation: fade 1.5s ease-in-out;
    }

    @keyframes fade {
      from { opacity: 0.4; }
      to { opacity: 1; }
    }

    .slider button {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 2rem;
      background: rgba(0, 0, 0, 0.4);
      color: white;
      border: none;
      padding: 8px 14px;
      cursor: pointer;
      border-radius: 5px;
      transition: background 0.3s;
      z-index: 10;
    }

    .slider button:hover {
      background: rgba(0, 0, 0, 0.7);
    }

    .prev {
      left: 10px;
    }

    .next {
      right: 10px;
    }
  </style>
</head>
<body>
  <div class="slider">
    <div class="slides">
      <img src="https://imgs.search.brave.com/Nn_81IVEnIbaQFJEnFcfnjJZ0Ke6g63_QNFUH33KqQQ/rs:fit:500:0:1:0/g:ce/aHR0cHM6Ly9pLnBp/bmltZy5jb20vb3Jp/Z2luYWxzL2M0LzQ5/Lzc1L2M0NDk3NTNm/NWU1NmUzNWQzYmUx/MWIwMGE4ODQ3OWVk/LmpwZw" alt="1">
      <img src="https://imgs.search.brave.com/7L-yWZYMGbY-PKRPR6VlRDWufqktYZimOO9JEQVEOrY/rs:fit:500:0:1:0/g:ce/aHR0cHM6Ly93YWxs/cGFwZXJjYXQuY29t/L3cvZnVsbC8xLzUv/Ni8xMjY4MzMtMTA4/MHgxOTIwLWlwaG9u/ZS0xMDgwcC1nYW1l/LW9mLXRocm9uZXMt/d2FsbHBhcGVyLXBo/b3RvLmpwZw" alt="2">
      <img src="https://imgs.search.brave.com/-JyGaEl9TXQ9e1o4Cf6npYuLRIkWrQsokwgbXmjmsW0/rs:fit:500:0:1:0/g:ce/aHR0cHM6Ly9ici53/ZWIuaW1nMi5hY3N0/YS5uZXQvY18zMDBf/MzAwL21lZGlhcy9u/bWVkaWEvMTgvNzUv/MDkvNjkvMTk2OTY4/NDIuanBn" alt="3">
      <img src="https://imgs.search.brave.com/wmiIxGzgm9K-Q6sIVmutQYEbe9ClQhxQdeYFmkAq_Jc/rs:fit:500:0:1:0/g:ce/aHR0cHM6Ly9zdGF0/aWMucG9zdGVycy5j/ei9pbWFnZS8zNTAv/cG9zdGVycy9nYW1l/LW9mLXRocm9uZXMt/am9uLXNub3ctaTEz/NTQ1Ni5qcGc" alt="4">
    </div>

    <button class="prev" onclick="prev()">&#10094;</button>
    <button class="next" onclick="next()">&#10095;</button>
  </div>

  <script src="script1.js"></script>
</body>
</html>
