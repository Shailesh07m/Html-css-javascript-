<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper ...</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Rock - Paper - Scissors</h1>
<div id="choices">
    <button class="btn" id="" onclick="play('rock')">👊</button>
<button class="btn" id="" onclick="play('paper')">✋</button>
<button class="btn" id="" onclick="play('scissors')">✌️</button>
</div>

<div id="pdisplay">Player</div>
<div id="cdisplay">Computer</div>
<div id="rdisplay"></div>

<div class="score"> Player  :
    <span id="pscore">0</span>
</div>
<div class="score"> Computer :
    <span id="cscore">0</span>
</div>

    <script src="script.js"></script>
</body>
</html>
